<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      max-width: 420px;
    }
    h1 { color: #2f855a; margin-top: 0; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sin conexión</h1>
    <p>No hay internet en este momento, pero StockLocal sigue disponible parcialmente.</p>
    <p>Cuando la conexión regrese, la información pendiente podrá sincronizarse.</p>
  </div>
</body>
</html>
